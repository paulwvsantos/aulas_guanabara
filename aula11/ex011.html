<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>País</title>
</head>

<body>
    <h1>Sua Nacionalidade</h1>
    <input type="text" name="txtpais" id="txtpais"> Digite seu país
    <input type="button" value="Salvar" onclick="mostrar()">
    <div id="res"></div>
    <script>
        function mostrar() {
            var pais = window.document.querySelector('input#txtpais').value
            var res = window.document.querySelector('div#res')
            if (pais === 'Brasil') {
                res.innerHTML = `<p>Você é <strong>Brasileiro</strong></p>`
            } else {
                res.innerHTML = `Você é <strong>Estrangeiro</strong></p>`
            }
            res.innerHTML += `<p>Vivendo em país: <strong>${pais}</strong></p>`
        }
    </script>
</body>

</html>
